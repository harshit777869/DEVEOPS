<!DOCTYPE html>
<html>
<head>
<title>Git Simulator</title>

<style>
body{font-family:Arial;background:#121212;color:white;text-align:center;}
.box{width:500px;margin:auto;margin-top:40px;background:#1e1e1e;padding:20px;border-radius:10px;}
button{padding:10px;background:#00ff99;border:none;margin:5px;}
.card{background:#2d2d2d;margin:10px;padding:10px;border-radius:8px;}
</style>
</head>
<body>

<div class="box">

<h2>Git Version Control Simulator</h2>

<button onclick="commit()">Commit</button>
<button onclick="branch()">Create Branch</button>
<button onclick="merge()">Merge (Conflict Demo)</button>

<div id="out"></div>

</div>

<script>
let commits = 0;
let branchCreated = false;

function commit(){
    commits++;
    out.innerHTML += `<div class="card">Commit #${commits} created ✔</div>`;
}

function branch(){
    branchCreated = true;
    out.innerHTML += `<div class="card">New branch created: dev-feature</div>`;
}

function merge(){
    if(branchCreated){
        out.innerHTML += `<div class="card">⚠ Merge Conflict Detected</div>`;
        out.innerHTML += `<div class="card">Conflict Resolved ✔</div>`;
    } else {
        out.innerHTML += `<div class="card">Nothing to merge</div>`;
    }
}
</script>

</body>
</html>
